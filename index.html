<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <title>Para mi niña hermosa ❤️</title>
</head>
<body>
    <div id="passwordOverlay" class="overlay">
        <div class="overlay-content">
            <p>Introduce la contraseña:</p>
            <input type="password" id="passwordInput" />
            <button id="passwordBtn" class="btn btn-primary">Enviar</button>
            <p id="passwordMessage"></p>
        </div>
    </div>
    <div class="background-animation"></div>
    <div class="particles"></div>

    <div class="container">
        <div class="title">
            <h1 style="color: #fff; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); font-family: 'Dancing Script', cursive; font-size: 3rem;">Para ti, mi amor ❤️</h1>
        </div>

        <div class="main-content">
            <div class="ramo-container">
                <div class="papel-kraft"></div>
                <div class="hojas-fondo">
                    <div class="hoja h1"></div><div class="hoja h2"></div>
                    <div class="hoja h3"></div><div class="hoja h4"></div>
                </div>
                <div class="flores">
                    <div class="tulipan t-fucsia f1"></div>
                    <div class="tulipan t-amarillo f2"></div>
                    <div class="tulipan t-morado f3"></div>
                    <div class="tulipan t-morado f4"></div>
                    <div class="tulipan t-fucsia f5"></div>
                    <div class="tulipan t-amarillo f6"></div>
                    <div class="tulipan t-fucsia f7"></div>
                    <div class="tulipan t-amarillo f8"></div>
                </div>
                <div class="papel-frontal"></div>
                <div class="etiqueta">CON AMOR</div>
                <div class="lazo">
                    <div class="oreja-izq"></div><div class="oreja-der"></div>
                    <div class="nudo"></div>
                </div>
                <div class="tallos-inferiores">
                    <div class="tallo t-inf1"></div><div class="tallo t-inf2"></div>
                    <div class="tallo t-inf3"></div>
                </div>
            </div>

            <div class="envelope-wrapper">
                <div id="envelope" class="close">
                    <div class="front flap"></div>
                    <div class="front pocket"></div>
                    <div class="letter">
                        <p id="line1" class="words"></p>
                        <p id="line2" class="words"></p>
                        <p id="line3" class="words"></p>
                        <p id="line4" class="words"></p>
                        <p id="line5" class="words"></p>
                    </div>
                    <div class="hearts">
                        <div class="heart a1"></div>
                        <div class="heart a2"></div>
                        <div class="heart a3"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="buttons-container">
            <button id="open" class="btn btn-primary">💌 Abrir Carta</button>
            <button id="reset" class="btn btn-secondary">✖ Cerrar</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>

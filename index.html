<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Para mi código favorito ❤️</title>
</head>
<body>
    <!-- Fondo animado -->
    <div class="background-animation"></div>
    
    <!-- Elementos flotantes de fondo -->
    <div class="floating-elements">
        <div class="element elem-1">✨</div>
        <div class="element elem-2">🌸</div>
        <div class="element elem-3">✨</div>
        <div class="element elem-4">🌹</div>
        <div class="element elem-5">✨</div>
    </div>

    <!-- Contenedor principal -->
    <div class="container">

        <!-- Ramo de flores decorativo -->
        <div class="bouquet">
            <div class="flower f1" style="--delay: 0s; --color: #ff69b4;">
                <div class="petal"></div>
                <div class="petal"></div>
                <div class="petal"></div>
                <div class="petal"></div>
                <div class="petal"></div>
                <div class="center"></div>
            </div>
            <div class="flower f2" style="--delay: 0.2s; --color: #ff1493;">
                <div class="petal"></div>
                <div class="petal"></div>
                <div class="petal"></div>
                <div class="petal"></div>
                <div class="petal"></div>
                <div class="center"></div>
            </div>
            <div class="flower f3" style="--delay: 0.4s; --color: #ffb6c1;">
                <div class="petal"></div>
                <div class="petal"></div>
                <div class="petal"></div>
                <div class="petal"></div>
                <div class="petal"></div>
                <div class="center"></div>
            </div>
            <div class="flower f4" style="--delay: 0.6s; --color: #ff69b4;">
                <div class="petal"></div>
                <div class="petal"></div>
                <div class="petal"></div>
                <div class="petal"></div>
                <div class="petal"></div>
                <div class="center"></div>
            </div>
            <div class="flower f5" style="--delay: 0.3s; --color: #ffc0cb;">
                <div class="petal"></div>
                <div class="petal"></div>
                <div class="petal"></div>
                <div class="petal"></div>
                <div class="petal"></div>
                <div class="center"></div>
            </div>
            <div class="stem"></div>
            <div class="leaf left"></div>
            <div class="leaf right"></div>
        </div>

        <div class="envelope-wrapper">
            <div id="envelope" class="close">
                <div class="front flap"></div>
                <div class="front pocket"></div>
                <div class="letter">
                    <p id="line1" class="words"></p>
                    <p id="line2" class="words"></p>
                    <p id="line3" class="words"></p>
                    <p id="line4" class="words"></p>
                    <p id="line5" class="words signature"></p>
                </div>
                <div class="hearts">
                    <div class="heart a1"></div>
                    <div class="heart a2"></div>
                    <div class="heart a3"></div>
                </div>
            </div>
        </div>

        <div class="buttons-container">
            <button id="open" class="btn btn-primary">💌 Abrir Carta</button>
            <button id="reset" class="btn btn-secondary">✖ Cerrar</button>
        </div>
    </div>

    <!-- Partículas de fondo -->
    <div class="particles"></div>

    <script src="script.js"></script>
</body>
</html>
